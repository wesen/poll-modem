#cloud-config
# Proxmox k3s + ArgoCD bootstrap for poll-modem
# Usage:
#   1. Upload to Proxmox: scp cloud-init.yaml root@pve:/var/lib/vz/snippets/cloud-init-k3s.yaml
#   2. Create VM:
#      qm create 301 --name k3s-server \
#        --memory 8192 --cores 4 --cpu host \
#        --net0 virtio,bridge=vmbr0 \
#        --bios ovmf --machine q35 --agent enabled=1 \
#        --cicustom user=local:snippets/cloud-init-k3s.yaml
#   3. Import disk, attach, resize, boot (see scripts/create-k3s-vm.sh)
#   4. After boot: tailscale up --auth-key=<key>

ssh_authorized_keys:
  - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAUIiBSpybDlRj//fWLvidWpKU/s/zfhGNDi6wkwvtNU manuel@f
  - ssh-rsa  root@pve

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - git
  - jq
  - qemu-guest-agent

write_files:
  # --- k3s config ---
  - path: /etc/rancher/k3s/config.yaml
    owner: root:root
    permissions: "0644"
    content: |
      write-kubeconfig-mode: "0644"
      disable:
        - traefik
      tls-san:
        - k3s-server
        - k3s-server.tail879302.ts.net
        - k3s-proxmox
        - k3s-proxmox.tail879302.ts.net

  # --- Tailscale repo ---
  - path: /usr/share/keyrings/tailscale-archive-keyring.gpg
    owner: root:root
    permissions: "0644"
    content: |
      # Placeholder — bootstrap script fetches the real key
  - path: /etc/apt/sources.list.d/tailscale.list
    owner: root:root
    permissions: "0644"
    content: |
      deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu noble main

  # --- Bootstrap script ---
  - path: /usr/local/bin/bootstrap-k3s.sh
    owner: root:root
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      export DEBIAN_FRONTEND=noninteractive
      export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

      log() { echo "[$(date +%H:%M:%S)] $*"; }

      kubectl() {
        /usr/local/bin/kubectl "$@"
      }

      # --- Tailscale ---
      log "Installing Tailscale..."
      mkdir -p --mode=0755 /usr/share/keyrings
      curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg \
        -o /usr/share/keyrings/tailscale-archive-keyring.gpg
      curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.tailscale-keyring.list \
        -o /etc/apt/sources.list.d/tailscale.list
      apt-get update -qq
      apt-get install -y -qq tailscale
      systemctl enable --now tailscaled
      log "Tailscale installed. Run 'tailscale up --auth-key=...' to join tailnet."

      # --- k3s ---
      log "Installing k3s..."
      curl -sfL https://get.k3s.io | sh -

      log "Waiting for k3s node ready..."
      until kubectl get nodes -o wide 2>/dev/null | grep -q " Ready"; do
        sleep 5
      done
      log "k3s ready!"
      kubectl get nodes -o wide

      # --- cert-manager ---
      log "Installing cert-manager..."
      kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.13.0/cert-manager.yaml
      kubectl wait --for=condition=Available deployment/cert-manager -n cert-manager --timeout=300s
      kubectl wait --for=condition=Available deployment/cert-manager-cainjector -n cert-manager --timeout=300s
      kubectl wait --for=condition=Available deployment/cert-manager-webhook -n cert-manager --timeout=300s
      log "cert-manager ready!"

      # --- ArgoCD ---
      log "Installing ArgoCD..."
      kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
      kubectl apply -n argocd --server-side --force-conflicts -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
      kubectl wait --for=condition=Available deployment/argocd-server -n argocd --timeout=300s
      kubectl wait --for=condition=Available deployment/argocd-repo-server -n argocd --timeout=300s
      kubectl rollout status statefulset/argocd-application-controller -n argocd --timeout=300s
      log "ArgoCD ready!"

      # --- Summary ---
      ARGO_PASS=$(kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d)
      TS_IP=$(tailscale ip -4 2>/dev/null || echo "not-joined")

      cat > /etc/motd <<MOTD
      ============================================
        k3s + ArgoCD cluster ready!
      ============================================

        kubectl:  export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
        ArgoCD:   kubectl port-forward svc/argocd-server -n argocd 8080:443
        Password: ${ARGO_PASS}
                  (also saved to /root/argocd-password)

        Tailscale IP: ${TS_IP}
        If not joined: sudo tailscale up --auth-key=<your-key>

      ============================================
      MOTD

      echo -n "$ARGO_PASS" > /root/argocd-password
      chmod 600 /root/argocd-password

      log "Bootstrap complete!"
      log "ArgoCD admin password: ${ARGO_PASS}"
      log "Tailscale IP: ${TS_IP}"

runcmd:
  - [systemctl, enable, --now, qemu-guest-agent]
  - [/usr/local/bin/bootstrap-k3s.sh]
